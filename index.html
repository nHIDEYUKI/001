<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HEADING MASTER</title>
    <style>
        :root {
            --primary: #f1c40f;
            --bg: #1a1a2e;
            --accent: #3498db;
            --danger: #e74c3c;
            --white: #ffffff;
            --panel-bg: rgba(255, 255, 255, 0.08);
            --panel-active-bg: rgba(255, 255, 255, 0.15);
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #header {
            width: 100%;
            padding: 15px 0 5px 0;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
        }

        #game-title {
            font-size: 28px;
            font-weight: 900;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.6);
        }

        #canvas-container {
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 5px;
            border: 2px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
        }

        canvas {
            background: radial-gradient(circle at 50% 30%, #2c3e50 0%, #000 100%);
            display: block;
            touch-action: none;
        }

        #fade-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: black;
            z-index: 200;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.4s ease-in-out;
        }
        #fade-overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        #controls {
            margin-top: 10px;
            display: flex;
            justify-content: center;
            width: 100%;
            padding-bottom: 20px;
        }

        .control-bar {
            height: 120px;
            background: var(--panel-bg);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: background 0.1s ease, border-color 0.1s ease;
            cursor: pointer;
        }

        .arrow-display {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .arrow-icon {
            width: 60px;
            height: 60px;
            fill: none;
            stroke: var(--white);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0.3;
            transform: scale(0.9);
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .control-bar.active {
            background: var(--panel-active-bg);
            border-color: var(--primary);
            box-shadow: 0 0 20px rgba(241, 196, 15, 0.2), 0 10px 30px rgba(0,0,0,0.3);
        }

        .control-bar.active .arrow-icon {
            opacity: 1;
            transform: scale(1.15);
            stroke: var(--primary);
        }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            display: none; 
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .modal.active {
            display: flex;
            opacity: 1;
        }

        .modal-content {
            text-align: center;
            padding: 30px 25px;
            background: #222;
            border-radius: 30px;
            border: 3px solid var(--primary);
            width: 90%;
            max-width: 440px;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
            transform: scale(1);
        }

        .modal-title {
            font-size: 36px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 5px;
            letter-spacing: 1px;
        }

        .tutorial-stage {
            margin: 15px 0;
            background: rgba(0,0,0,0.3);
            border-radius: 20px;
            padding: 20px 15px;
            border: 1px solid rgba(255,255,255,0.1);
            position: relative;
            overflow: hidden;
        }

        .tutorial-title {
            font-size: 13px;
            font-weight: 800;
            color: var(--primary);
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tutorial-visuals {
            display: flex;
            align-items: flex-end;
            justify-content: center;
            gap: 25px;
            margin-bottom: 10px;
        }

        .keys-container {
            display: grid;
            grid-template-columns: repeat(3, 40px);
            grid-template-rows: repeat(2, 40px);
            gap: 4px;
            padding-bottom: 2px;
        }

        .key-box {
            background: #333;
            border: 2px solid #555;
            border-radius: 6px;
            width: 38px;
            height: 38px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: rgba(255,255,255,0.4);
            box-shadow: 0 3px 0 #111;
        }

        .key-up { grid-column: 2; grid-row: 1; }
        .key-left { grid-column: 1; grid-row: 2; }
        .key-down { grid-column: 2; grid-row: 2; }
        .key-right { 
            grid-column: 3; 
            grid-row: 2; 
            animation: key-active-sync 2s infinite steps(2);
        }

        @keyframes key-active-sync {
            0%, 49.9% { background: var(--accent); border-color: white; color: white; transform: translateY(2px); box-shadow: 0 1px 0 #111; }
            50%, 100% { background: #333; border-color: #555; color: rgba(255,255,255,0.4); transform: translateY(0); box-shadow: 0 3px 0 #111; }
        }

        .touch-tutorial-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .bar-preview {
            width: 80px;
            height: 48px;
            background: var(--panel-bg);
            border: 2px solid rgba(255,255,255,0.2);
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            box-sizing: border-box;
            animation: bar-active-sync 2s infinite steps(2);
        }

        .bar-preview svg {
            width: 25px;
            height: 25px;
            stroke: white;
            opacity: 0.3;
        }

        @keyframes bar-active-sync {
            0%, 49.9% { background: var(--panel-active-bg); border-color: var(--primary); }
            50%, 100% { background: var(--panel-bg); border-color: rgba(255,255,255,0.2); }
        }

        .bar-preview-active-svg {
            animation: icon-active-sync 2s infinite steps(2);
        }

        @keyframes icon-active-sync {
            0%, 49.9% { opacity: 1; stroke: var(--primary); transform: scale(1.1); }
            50%, 100% { opacity: 0.3; stroke: white; transform: scale(1); }
        }

        .char-preview {
            width: 40px;
            height: 50px;
            animation: char-move-right 2s infinite linear;
        }

        @keyframes char-move-right {
            0% { transform: translateX(-25px); }
            50% { transform: translateX(25px); }
            100% { transform: translateX(-25px); }
        }

        .score-row {
            margin: 15px 0;
            font-size: 24px;
            font-weight: 600;
        }

        .highscore-row {
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 20px;
            font-size: 26px;
        }

        .action-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 18px 20px;
            font-size: 22px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #c7a40c;
            transition: all 0.1s;
            width: 100%;
            margin-bottom: 10px;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            user-select: none;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #c7a40c;
        }

        .space-graphic {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            height: 42px; 
            width: 130px; 
            background: rgba(0,0,0,0.15);
            border: 2px solid rgba(0,0,0,0.3);
            border-radius: 8px;
            font-size: 20px; 
            font-weight: 900;
            position: relative;
            color: rgba(0,0,0,0.75);
            letter-spacing: 2px;
            box-shadow: 0 4px 0 rgba(0,0,0,0.2);
            margin-bottom: 4px;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="fade-overlay"></div>

    <div id="header">
        <h1 id="game-title">HEADING MASTER</h1>
    </div>

    <div id="canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="controls">
        <div id="controlBar" class="control-bar">
            <div class="arrow-display">
                <svg id="arrowRight" class="arrow-icon" viewBox="0 0 24 24">
                    <path d="M5 12H19M19 12L12 5M19 12L12 19"/>
                </svg>
            </div>
        </div>
    </div>

    <div id="startModal" class="modal active">
        <div class="modal-content">
            <div class="modal-title">HEADING MASTER</div>
            <div class="score-row highscore-row">HIGH SCORE: <span id="startHighScore">0</span></div>
            
            <div class="tutorial-stage">
                <div class="tutorial-title">HOLD TO MOVE RIGHT</div>
                <div class="tutorial-visuals">
                    <div class="keys-container">
                        <div class="key-box key-up">↑</div>
                        <div class="key-box key-left">←</div>
                        <div class="key-box key-down">↓</div>
                        <div class="key-box key-right">→</div>
                    </div>
                    
                    <div class="touch-tutorial-group">
                        <div class="char-preview">
                            <svg viewBox="0 0 40 50">
                                <rect x="5" y="25" width="30" height="20" rx="5" fill="#3498db" />
                                <circle cx="20" cy="15" r="12" fill="#ffdbac" />
                                <circle cx="15" cy="13" r="2" fill="black" />
                                <circle cx="25" cy="13" r="2" fill="black" />
                            </svg>
                        </div>

                        <div class="bar-preview">
                            <svg class="bar-preview-active-svg" viewBox="0 0 24 24" fill="none" stroke-width="3">
                                <path d="M5 12H19M19 12L12 5M19 12L12 19"/>
                            </svg>
                        </div>
                    </div>
                </div>
            </div>

            <button class="action-btn" id="startBtn">
                <span>START</span>
                <div class="space-graphic">SPACE</div>
            </button>
        </div>
    </div>

    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">GAME OVER</div>
            <div class="score-row">SCORE: <span id="finalScore">0</span></div>
            <div class="score-row highscore-row">HIGH SCORE: <span id="highScore">0</span></div>
            
            <button class="action-btn" id="retryBtn">
                <span>RETRY</span>
                <div class="space-graphic">SPACE</div>
            </button>
        </div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startModal = document.getElementById("startModal");
    const gameOverModal = document.getElementById("gameOverModal");
    const fadeOverlay = document.getElementById("fade-overlay");
    const finalScoreText = document.getElementById("finalScore");
    const highScoreText = document.getElementById("highScore");
    const startHighScoreText = document.getElementById("startHighScore");
    const controlBar = document.getElementById("controlBar");
    const startBtn = document.getElementById("startBtn");
    const retryBtn = document.getElementById("retryBtn");

    let sessionHighScore = 0; 
    let audioCtx;
    let animationId; 
    let isTransitioning = false; 

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSound(type, comboCount = 0) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'hit') {
            osc.type = 'sine';
            const freq = 400 + (Math.min(comboCount, 15) * 30);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } 
        else if (type === 'wall') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(220, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        }
        else if (type === 'pop') {
            osc.type = 'square';
            osc.frequency.setValueAtTime(120, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(30, audioCtx.currentTime + 0.25);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.25);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.25);
        }
        else if (type === 'over') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.8);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.8);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.8);
        }
    }

    const baseWidth = 400;
    const baseHeight = 500;
    const scale = Math.min(window.innerWidth * 0.95 / baseWidth, window.innerHeight * 0.50 / baseHeight);
    canvas.width = baseWidth;
    canvas.height = baseHeight;
    canvas.style.width = (baseWidth * scale) + "px";
    canvas.style.height = (baseHeight * scale) + "px";
    controlBar.style.width = (baseWidth * scale) + "px";

    let score = 0;
    let combo = 0;
    let gameOver = true; 
    let gameStarted = false;
    let particles = [];
    let balls = [];
    let lastSpawnTime = 0;
    let isMoving = false;
    let moveRight = false;
    
    const scoreAnim = { val: 0, opacity: 0, scale: 1.0, startTime: 0 };
    const SPAWN_INTERVAL = 2500; 
    const MAX_BALLS = 12;        
    const STRESS_LIMIT = 5; // 破裂までのカウントを少し余裕を持たせる

    const paddle = {
        w: 60, h: 70, x: canvas.width * 0.7, y: canvas.height - 10,
        baseSpeed: 5, speed: 5, dx: 0, color: "#ffdbac",
        stunned: false, stunTimer: 0
    };

    const DIFFICULTY_SETTINGS = {
        gravity: { start: 0.1, end: 0.22 },
        bounce: { start: -10, end: -13 },
        maxVelocity: { start: 8, end: 14 }
    };

    function createBall() {
        const difficulty = Math.min(score / 100, 1.0);
        return {
            x: Math.random() * (canvas.width - 100) + 50, y: 40, radius: 26,
            dx: (Math.random() - 0.5) * 6, dy: 1, 
            gravity: DIFFICULTY_SETTINGS.gravity.start + (DIFFICULTY_SETTINGS.gravity.end - DIFFICULTY_SETTINGS.gravity.start) * difficulty,
            maxVelocity: DIFFICULTY_SETTINGS.maxVelocity.start + (DIFFICULTY_SETTINGS.maxVelocity.end - DIFFICULTY_SETTINGS.maxVelocity.start) * difficulty,
            friction: 0.995, 
            bounce: DIFFICULTY_SETTINGS.bounce.start + (DIFFICULTY_SETTINGS.bounce.end - DIFFICULTY_SETTINGS.bounce.start) * difficulty,
            angle: 0, rotationSpeed: (Math.random() - 0.5) * 0.2,
            squish: 0, squishAngle: 0, targetSquish: 0,
            stress: 0 
        };
    }

    function applySquish(ball, angle, intensity = 0.25) {
        ball.squish = intensity; ball.squishAngle = angle;
    }

    function createParticles(x, y, color, count = 8, speed = 8) {
        for(let i=0; i<count; i++) {
            particles.push({
                x: x, y: y, dx: (Math.random() - 0.5) * speed, dy: (Math.random() - 0.5) * speed,
                life: 1.0, color: color, size: Math.random() * 4 + 2
            });
        }
    }

    function checkBallCollision(b1, b2) {
        if (b1.y < 0 || b2.y < 0) return;
        const dx = b2.x - b1.x; const dy = b2.y - b1.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < b1.radius + b2.radius) {
            const angle = Math.atan2(dy, dx);
            const cos = Math.cos(angle); const sin = Math.sin(angle);
            const overlap = (b1.radius + b2.radius - dist) / 2;
            b1.x -= overlap * cos; b1.y -= overlap * sin;
            b2.x += overlap * cos; b2.y += overlap * sin;
            const v1 = b1.dx * cos + b1.dy * sin; const v2 = b2.dx * cos + b2.dy * sin;
            b1.dx = b1.dx - (v1 - v2) * cos; b1.dy = b1.dy - (v1 - v2) * sin;
            b2.dx = b2.dx + (v1 - v2) * cos; b2.dy = b2.dy + (v1 - v2) * sin;
            applySquish(b1, angle, 0.2); applySquish(b2, angle + Math.PI, 0.2);
        }
    }

    async function transitionToGame(e) {
        if (isTransitioning) return;
        if (e) { e.preventDefault(); e.stopPropagation(); }
        isTransitioning = true;
        initAudio();
        fadeOverlay.classList.add("active");
        await new Promise(r => setTimeout(r, 450));
        startModal.classList.remove("active");
        gameOverModal.classList.remove("active");
        resetGameState();
        fadeOverlay.classList.remove("active");
        gameStarted = true;
        gameOver = false;
        setInputInactive();
        if (animationId) cancelAnimationFrame(animationId);
        animationId = requestAnimationFrame(gameLoop);
        setTimeout(() => { isTransitioning = false; }, 450);
    }

    function resetGameState() {
        score = 0; combo = 0;
        scoreAnim.opacity = 0;
        balls = [createBall()];
        lastSpawnTime = Date.now();
        paddle.x = canvas.width * 0.7;
        paddle.dx = 0;
        paddle.stunned = false;
        paddle.stunTimer = 0;
        particles = [];
        updateVisualFeedback();
    }

    function updateVisualFeedback() {
        if (!gameStarted || gameOver || isTransitioning || paddle.stunned) {
            controlBar.classList.remove('active');
            return;
        }
        if (isMoving && moveRight) {
            controlBar.classList.add('active');
        } else {
            controlBar.classList.remove('active');
        }
    }

    function setInputActive() {
        if (gameOver || !gameStarted || isTransitioning || paddle.stunned) return;
        moveRight = true; isMoving = true;
        updateVisualFeedback();
    }

    function setInputInactive() {
        moveRight = false; isMoving = false;
        updateVisualFeedback();
    }

    startBtn.addEventListener("mouseup", transitionToGame);
    startBtn.addEventListener("touchend", transitionToGame, {passive: false});
    retryBtn.addEventListener("mouseup", transitionToGame);
    retryBtn.addEventListener("touchend", transitionToGame, {passive: false});

    [controlBar, canvas].forEach(el => {
        el.addEventListener("touchstart", (e) => { e.preventDefault(); setInputActive(); }, {passive: false});
        el.addEventListener("mousedown", setInputActive);
    });

    window.addEventListener("touchend", setInputInactive);
    window.addEventListener("mouseup", setInputInactive);
    window.addEventListener("keydown", e => {
        if(e.key === "ArrowRight") setInputActive();
        if(e.key === " " && (gameOver || !gameStarted)) transitionToGame();
    });
    window.addEventListener("keyup", e => {
        if(e.key === "ArrowRight") setInputInactive();
    });

    function update() {
        if (gameOver || isTransitioning) return;

        const difficulty = Math.min(score / 100, 1.0);
        const currentGravity = DIFFICULTY_SETTINGS.gravity.start + (DIFFICULTY_SETTINGS.gravity.end - DIFFICULTY_SETTINGS.gravity.start) * difficulty;
        const currentMaxVelocity = DIFFICULTY_SETTINGS.maxVelocity.start + (DIFFICULTY_SETTINGS.maxVelocity.end - DIFFICULTY_SETTINGS.maxVelocity.start) * difficulty;
        const currentBounce = DIFFICULTY_SETTINGS.bounce.start + (DIFFICULTY_SETTINGS.bounce.end - DIFFICULTY_SETTINGS.bounce.start) * difficulty;

        if (paddle.stunned) {
            paddle.stunTimer--;
            paddle.dx = 0;
            if (paddle.stunTimer <= 0) {
                paddle.stunned = false;
                updateVisualFeedback();
            }
        } else {
            paddle.speed = paddle.baseSpeed + (balls.length * 1.5);
            paddle.dx = moveRight ? paddle.speed : -paddle.speed;
        }

        if (Date.now() - lastSpawnTime > SPAWN_INTERVAL && balls.length < MAX_BALLS) {
            balls.push(createBall()); lastSpawnTime = Date.now();
        }

        paddle.x += paddle.dx;
        const limit = paddle.w/2;
        if (paddle.x < limit) paddle.x = limit;
        if (paddle.x > canvas.width - limit) paddle.x = canvas.width - limit;

        if (scoreAnim.opacity > 0) {
            const elapsed = Date.now() - scoreAnim.startTime;
            if (elapsed > 100) { scoreAnim.opacity -= 0.015; scoreAnim.scale += 0.002; }
        }

        for (let i = balls.length - 1; i >= 0; i--) {
            let ball = balls[i];
            
            ball.gravity = currentGravity;
            ball.maxVelocity = currentMaxVelocity;
            ball.bounce = currentBounce;

            ball.dy = Math.min(ball.dy + ball.gravity, ball.maxVelocity);
            ball.x += ball.dx; ball.y += ball.dy;
            ball.angle += ball.rotationSpeed; ball.dx *= ball.friction;
            ball.squish += (ball.targetSquish - ball.squish) * 0.25;

            // --- 壁判定 ---
            let wallContact = false;
            if (ball.x < ball.radius) { 
                ball.dx = Math.abs(ball.dx) * 0.8; ball.x = ball.radius; 
                if (ball.y > 0) { playSound('wall'); wallContact = true; }
            } else if (ball.x > canvas.width - ball.radius) { 
                ball.dx = -Math.abs(ball.dx) * 0.8; ball.x = canvas.width - ball.radius; 
                if (ball.y > 0) { playSound('wall'); wallContact = true; }
            }
            if (ball.y < ball.radius) { ball.dy = Math.abs(ball.dy) * 0.8; ball.y = ball.radius; playSound('wall'); }

            // キャラクター（円形頭部）との衝突判定
            const hCX = paddle.x; const hCY = paddle.y - paddle.h / 1.5; const hR = paddle.w / 2.2;
            const dX = ball.x - hCX; const dY = ball.y - hCY; const dist = Math.sqrt(dX * dX + dY * dY);
            const sumR = ball.radius + hR;

            let paddleContact = false;

            if (dist < sumR) {
                paddleContact = true;
                const angle = Math.atan2(dY, dX);
                const overlap = sumR - dist;
                
                // 押し出し
                ball.x += Math.cos(angle) * overlap;
                ball.y += Math.sin(angle) * overlap;

                // 壁クランプ（再度）
                if (ball.x < ball.radius) ball.x = ball.radius;
                if (ball.x > canvas.width - ball.radius) ball.x = canvas.width - ball.radius;

                // 打ち返し処理
                if (ball.dy > -2) { 
                    ball.dx = Math.cos(angle) * Math.abs(ball.bounce) * 0.8 + paddle.dx * 0.5;
                    ball.dy = -Math.abs(Math.sin(angle)) * Math.abs(ball.bounce);
                    ball.rotationSpeed = ball.dx * 0.05;
                    applySquish(ball, angle, 0.25);

                    if (!paddle.stunned) {
                        score++; combo++;
                        scoreAnim.val = score; scoreAnim.opacity = 1.0; scoreAnim.scale = 1.0; scoreAnim.startTime = Date.now();
                        createParticles(ball.x, ball.y + ball.radius, "#f1c40f");
                        playSound('hit', combo);
                    }
                }
            }

            // --- 押しつぶし（ストレス）判定の修正 ---
            // ボールが「壁」と「キャラクター」の両方に同時に触れている場合のみストレスを溜める
            const wallThreshold = 5;
            const isAtLeftWall = (ball.x <= ball.radius + wallThreshold);
            const isAtRightWall = (ball.x >= canvas.width - ball.radius - wallThreshold);
            
            // 物理的に挟まれているかのチェック（距離ベースで厳密に）
            const isCrushedLeft = isAtLeftWall && (paddle.x - hR < ball.x + ball.radius);
            const isCrushedRight = isAtRightWall && (paddle.x + hR > ball.x - ball.radius);

            // 垂直方向の距離も考慮（頭の高さ付近にいるときだけ挟まるとみなす）
            const isNearHeadHeight = Math.abs(ball.y - hCY) < ball.radius + hR;

            if ((isCrushedLeft || isCrushedRight) && isNearHeadHeight) {
                // キャラクターが壁に向かって動いている場合、ストレス増加速度アップ
                if ((isCrushedLeft && paddle.dx < 0) || (isCrushedRight && paddle.dx > 0)) {
                    ball.stress += 2;
                } else {
                    ball.stress += 1;
                }

                if (ball.stress >= STRESS_LIMIT) {
                    createParticles(ball.x, ball.y, "#e74c3c", 30, 15);
                    playSound('pop');
                    balls.splice(i, 1);
                    combo = 0;
                    paddle.stunned = true;
                    paddle.stunTimer = 60; 
                    updateVisualFeedback();
                    if (balls.length === 0) endGame();
                    continue;
                }
            } else {
                // 挟まれていない場合はストレスを急速に減らす（通常の壁バウンドでは破裂しない）
                ball.stress = 0; 
            }

            for (let j = i - 1; j >= 0; j--) checkBallCollision(ball, balls[j]);
            
            if (ball.y > canvas.height + 50) {
                balls.splice(i, 1); combo = 0; 
                if (balls.length === 0) endGame();
            }
        }
        
        particles.forEach((p, i) => {
            p.x += p.dx; p.y += p.dy; p.life -= 0.025;
            if(p.life <= 0) particles.splice(i, 1);
        });
    }

    async function endGame() {
        if (gameOver || isTransitioning) return;
        gameOver = true;
        isTransitioning = true;
        setInputInactive();
        
        playSound('over');
        fadeOverlay.classList.add("active");
        await new Promise(r => setTimeout(r, 450));

        if (score > sessionHighScore) {
            sessionHighScore = score;
            highScoreText.innerHTML = `${sessionHighScore} <span style="color:#2ecc71;font-size:16px">NEW!</span>`;
        } else {
            highScoreText.innerText = sessionHighScore;
        }
        startHighScoreText.innerText = sessionHighScore;
        finalScoreText.innerText = score;

        gameOverModal.classList.add("active");
        fadeOverlay.classList.remove("active");
        
        setTimeout(() => {
            isTransitioning = false;
        }, 450);
    }

    function drawScoreText() {
        if (scoreAnim.opacity <= 0) return;
        ctx.save(); ctx.globalAlpha = scoreAnim.opacity; ctx.fillStyle = "#f1c40f"; ctx.textAlign = "center";
        ctx.font = `900 ${100 * scoreAnim.scale}px 'Segoe UI', sans-serif`;
        ctx.fillText(scoreAnim.val, canvas.width / 2, 80); ctx.restore();
    }

    function drawSoccerBall(ball) {
        ctx.save(); ctx.translate(ball.x, ball.y); ctx.rotate(ball.squishAngle); ctx.scale(1 - ball.squish, 1 + ball.squish);
        ctx.rotate(-ball.squishAngle); ctx.rotate(ball.angle);
        ctx.beginPath(); ctx.arc(0, 0, ball.radius, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(-ball.radius*0.3, -ball.radius*0.3, ball.radius*0.1, 0, 0, ball.radius);
        grad.addColorStop(0, "#fff"); grad.addColorStop(1, "#888");
        ctx.fillStyle = grad; ctx.fill(); ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.stroke();
        ctx.fillStyle = "#222";
        for (let i = 0; i < 5; i++) {
            ctx.beginPath(); const a = (Math.PI * 2 / 5) * i;
            ctx.arc(Math.cos(a)*ball.radius*0.6, Math.sin(a)*ball.radius*0.6, ball.radius*0.28, 0, Math.PI*2); ctx.fill();
        }
        ctx.restore();
    }

    function drawCharacter(x, y, w, h, isStunned) {
        ctx.save(); 
        if (isStunned) {
            x += (Math.random() - 0.5) * 4;
            y += (Math.random() - 0.5) * 4;
        }
        ctx.fillStyle = "#3498db";
        ctx.beginPath(); ctx.roundRect(x - w/2.5, y - h/2.5, w/1.25, h/2, 5); ctx.fill();
        ctx.fillStyle = paddle.color; ctx.beginPath(); ctx.ellipse(x, y - h/1.5, w/2.2, h/2.5, 0, 0, Math.PI * 2); ctx.fill();
        
        if (isStunned) {
            ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.lineCap = "round";
            ctx.beginPath(); ctx.moveTo(x - 12, y - h/1.5 - 8); ctx.lineTo(x - 4, y - h/1.5 - 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x - 4, y - h/1.5 - 8); ctx.lineTo(x - 12, y - h/1.5 - 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x + 4, y - h/1.5 - 8); ctx.lineTo(x + 12, y - h/1.5 - 2); ctx.stroke();
            ctx.beginPath(); ctx.moveTo(x + 12, y - h/1.5 - 8); ctx.lineTo(x + 4, y - h/1.5 - 2); ctx.stroke();
            ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(x, y - h/1.5 + 8, 5, 0, Math.PI * 2); ctx.fill();
        } else {
            ctx.fillStyle = "#000"; ctx.beginPath(); ctx.arc(x - 8, y - h/1.5 - 5, 3, 0, Math.PI * 2); ctx.fill();
            ctx.beginPath(); ctx.arc(x + 8, y - h/1.5 - 5, 3, 0, Math.PI * 2); ctx.fill();
            ctx.strokeStyle = "#000"; ctx.lineWidth = 2; ctx.beginPath(); ctx.arc(x, y - h/1.5 + 5, 7, 0.2, Math.PI - 0.2); ctx.stroke();
        }
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(255,255,255,0.08)"; ctx.lineWidth = 1.5;
        for(let i=0; i<canvas.width; i+=40) { ctx.beginPath(); ctx.moveTo(i,0); ctx.lineTo(i,canvas.height); ctx.stroke(); }
        for(let i=0; i<canvas.height; i+=40) { ctx.beginPath(); ctx.moveTo(0,i); ctx.lineTo(canvas.width,i); ctx.stroke(); }
        drawScoreText();
        particles.forEach(p => {
            ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, p.size, 0, Math.PI*2); ctx.fill(); ctx.restore();
        });
        drawCharacter(paddle.x, paddle.y, paddle.w, paddle.h, paddle.stunned);
        balls.forEach(drawSoccerBall);
    }

    function gameLoop() {
        update(); draw();
        if (!gameOver || isTransitioning) animationId = requestAnimationFrame(gameLoop);
    }

    window.onload = () => {
        startHighScoreText.innerText = sessionHighScore; 
        draw();
    };
</script>
</body>
