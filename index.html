<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pro Heading Master EXTREME</title>
    <style>
        :root {
            --primary: #f1c40f;
            --bg: #1a1a2e;
            --accent: #3498db;
            --danger: #e74c3c;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            color: white;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #header {
            width: 100%;
            padding: 15px 0;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.5), transparent);
        }

        #game-title {
            font-size: 28px;
            font-weight: 900;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 10px rgba(241, 196, 15, 0.5);
        }

        #canvas-container {
            position: relative;
            box-shadow: 0 0 30px rgba(0,0,0,0.5);
            border-radius: 8px;
            overflow: hidden;
            margin-top: 10px;
        }

        canvas {
            background: radial-gradient(circle at 50% 30%, #2c3e50 0%, #000 100%);
            display: block;
            touch-action: none;
        }

        #controls {
            display: flex;
            width: 100%;
            max-width: 480px;
            padding: 20px;
            box-sizing: border-box;
        }

        .control-btn {
            flex: 1;
            height: 80px;
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(255, 255, 255, 0.1);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: bold;
            font-size: 18px;
            transition: all 0.1s;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        #btnLeft {
            border-radius: 15px 0 0 15px;
            border-right: none;
        }

        #btnRight {
            border-radius: 0 15px 15px 0;
        }

        .control-btn:active {
            background: var(--accent);
            border-color: #fff;
            transform: scale(0.98);
            z-index: 2;
        }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }

        .modal.show {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            text-align: center;
            padding: 40px;
            background: #222;
            border-radius: 20px;
            border: 2px solid var(--primary);
            width: 80%;
            max-width: 320px;
        }

        .modal-title {
            font-size: 32px;
            color: var(--primary);
            margin-bottom: 10px;
        }

        .score-row {
            margin: 10px 0;
            font-size: 18px;
        }

        .highscore-row {
            color: var(--primary);
            font-weight: bold;
            margin-bottom: 20px;
        }

        .action-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            border-radius: 30px;
            cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.3);
            transition: transform 0.1s;
        }

        .action-btn:active {
            transform: scale(0.95);
        }

        .instruction-text {
            font-size: 14px;
            color: #aaa;
            margin-top: 15px;
        }
    </style>
</head>
<body>

    <div id="header">
        <h1 id="game-title">Heading Master</h1>
    </div>

    <div id="canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="controls">
        <div id="btnLeft" class="control-btn">LEFT</div>
        <div id="btnRight" class="control-btn">RIGHT</div>
    </div>

    <!-- Start Modal -->
    <div id="startModal" class="modal show">
        <div class="modal-content">
            <div class="modal-title">READY?</div>
            <div class="score-row highscore-row">High Score: <span id="startHighScore">0</span></div>
            <button class="action-btn" onclick="startGame()">START GAME</button>
            <p class="instruction-text">Tap LEFT/RIGHT to move<br>Don't let the ball drop!</p>
        </div>
    </div>

    <!-- Game Over Modal -->
    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">GAME OVER</div>
            <div class="score-row">Current Score: <span id="finalScore">0</span></div>
            <div class="score-row highscore-row">High Score: <span id="highScore">0</span></div>
            <button class="action-btn" onclick="resetGame()">RESTART</button>
        </div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startModal = document.getElementById("startModal");
    const gameOverModal = document.getElementById("gameOverModal");
    const finalScoreText = document.getElementById("finalScore");
    const highScoreText = document.getElementById("highScore");
    const startHighScoreText = document.getElementById("startHighScore");

    const STORAGE_KEY = 'heading_master_highscore_v1';
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();

    function playSound(type, comboCount = 0) {
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'hit') {
            osc.type = 'sine';
            const freq = 400 + (Math.min(comboCount, 15) * 30);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } 
        else if (type === 'wall') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }
        else if (type === 'over') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }
    }

    const baseWidth = 400;
    const baseHeight = 500;
    const scale = Math.min(window.innerWidth * 0.9 / baseWidth, window.innerHeight * 0.5 / baseHeight);
    canvas.width = baseWidth;
    canvas.height = baseHeight;
    canvas.style.width = (baseWidth * scale) + "px";
    canvas.style.height = (baseHeight * scale) + "px";

    let score = 0;
    let combo = 0;
    let gameOver = true; 
    let gameStarted = false;
    let particles = [];
    let balls = [];
    let lastSpawnTime = 0;
    
    // スコアアニメーションの状態
    const scoreAnim = {
        val: 0,
        opacity: 0,
        scale: 1.0,
        startTime: 0
    };

    // ボールの出現間隔（3秒に変更）
    const SPAWN_INTERVAL = 3000; 
    const MAX_BALLS = 10;        

    const paddle = {
        w: 60,
        h: 70,
        x: canvas.width / 2,
        y: canvas.height - 10,
        baseSpeed: 4, 
        speed: 4,     
        dx: 0,
        color: "#ffdbac"
    };

    function createBall() {
        return {
            x: Math.random() * (canvas.width - 60) + 30,
            y: -30,
            radius: 24, 
            dx: (Math.random() - 0.5) * 6,
            dy: 2,
            gravity: 0.22,
            friction: 0.995,
            bounce: -13,
            angle: 0,
            rotationSpeed: (Math.random() - 0.5) * 0.2
        };
    }

    const keys = { left: false, right: false };

    function createParticles(x, y, color) {
        for(let i=0; i<8; i++) {
            particles.push({
                x: x, y: y,
                dx: (Math.random() - 0.5) * 8,
                dy: (Math.random() - 0.5) * 8,
                life: 1.0, color: color
            });
        }
    }

    function checkBallCollision(b1, b2) {
        const dx = b2.x - b1.x;
        const dy = b2.y - b1.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < b1.radius + b2.radius) {
            const angle = Math.atan2(dy, dx);
            const sin = Math.sin(angle);
            const cos = Math.cos(angle);
            const overlap = (b1.radius + b2.radius - dist) / 2;
            b1.x -= overlap * cos;
            b1.y -= overlap * sin;
            b2.x += overlap * cos;
            b2.y += overlap * sin;
            const v1 = b1.dx * cos + b1.dy * sin;
            const v2 = b2.dx * cos + b2.dy * sin;
            b1.dx = b1.dx - (v1 - v2) * cos;
            b1.dy = b1.dy - (v1 - v2) * sin;
            b2.dx = b2.dx + (v1 - v2) * cos;
            b2.dy = b2.dy + (v1 - v2) * sin;
            playSound('wall');
        }
    }

    function startGame() {
        gameStarted = true;
        startModal.classList.remove("show");
        resetGame();
    }

    function resetGame() {
        score = 0;
        combo = 0;
        gameOver = false;
        gameOverModal.classList.remove("show");
        scoreAnim.opacity = 0;
        balls = [createBall()];
        lastSpawnTime = Date.now();
        paddle.x = canvas.width / 2;
        particles = [];
        requestAnimationFrame(gameLoop);
    }

    window.addEventListener("keydown", e => {
        if(e.key === "ArrowLeft") keys.left = true;
        if(e.key === "ArrowRight") keys.right = true;
        if(e.key === " " || e.key === "Enter") {
            if(!gameStarted) startGame();
            else if(gameOver) resetGame();
        }
    });
    window.addEventListener("keyup", e => {
        if(e.key === "ArrowLeft") keys.left = false;
        if(e.key === "ArrowRight") keys.right = false;
    });

    function setupBtn(id, dir) {
        const btn = document.getElementById(id);
        const start = (e) => { e.preventDefault(); keys[dir] = true; };
        const end = (e) => { e.preventDefault(); keys[dir] = false; };
        btn.addEventListener("touchstart", start, {passive: false});
        btn.addEventListener("touchend", end, {passive: false});
        btn.addEventListener("mousedown", start);
        btn.addEventListener("mouseup", end);
        btn.addEventListener("mouseleave", end);
    }
    setupBtn("btnLeft", "left");
    setupBtn("btnRight", "right");

    function update() {
        if (gameOver) return;

        paddle.speed = paddle.baseSpeed + (balls.length * 3.0);

        if (Date.now() - lastSpawnTime > SPAWN_INTERVAL && balls.length < MAX_BALLS) {
            balls.push(createBall());
            lastSpawnTime = Date.now();
        }

        if (keys.left) paddle.dx = -paddle.speed;
        else if (keys.right) paddle.dx = paddle.speed;
        else paddle.dx *= 0.8;
        paddle.x += paddle.dx;
        paddle.x = Math.max(paddle.w/2, Math.min(canvas.width - paddle.w/2, paddle.x));

        // スコアアニメーションの更新（フェードアウト効果）
        if (scoreAnim.opacity > 0) {
            const elapsed = Date.now() - scoreAnim.startTime;
            if (elapsed > 100) { 
                scoreAnim.opacity -= 0.015; 
                scoreAnim.scale += 0.002;
            }
        }

        for (let i = balls.length - 1; i >= 0; i--) {
            let ball = balls[i];
            ball.dy += ball.gravity;
            ball.x += ball.dx;
            ball.y += ball.dy;
            ball.angle += ball.rotationSpeed;
            ball.dx *= ball.friction;

            if (ball.x < ball.radius || ball.x > canvas.width - ball.radius) {
                ball.dx *= -0.8;
                ball.x = ball.x < ball.radius ? ball.radius : canvas.width - ball.radius;
                ball.rotationSpeed *= -1;
                playSound('wall');
            }
            if (ball.y < ball.radius) {
                ball.dy *= -0.8;
                ball.y = ball.radius;
                playSound('wall');
            }

            const headTop = paddle.y - paddle.h;
            if (ball.dy > 0 && ball.y + ball.radius > headTop && ball.y < paddle.y &&
                Math.abs(ball.x - paddle.x) < paddle.w/2 + ball.radius) {
                
                const diff = ball.x - paddle.x;
                ball.dx = diff * 0.25 + paddle.dx * 0.5;
                ball.dy = ball.bounce;
                ball.y = headTop - ball.radius;
                ball.rotationSpeed = ball.dx * 0.05;

                score++;
                combo++;
                
                // スコアアニメーションのトリガー
                scoreAnim.val = score;
                scoreAnim.opacity = 1.0;
                scoreAnim.scale = 1.0;
                scoreAnim.startTime = Date.now();
                
                createParticles(ball.x, ball.y + ball.radius, "#f1c40f");
                playSound('hit', combo);
            }

            for (let j = i - 1; j >= 0; j--) {
                checkBallCollision(ball, balls[j]);
            }

            if (ball.y > canvas.height + 50) {
                balls.splice(i, 1);
                combo = 0; 
                if (balls.length === 0) {
                    endGame();
                }
            }
        }

        particles.forEach((p, i) => {
            p.x += p.dx; p.y += p.dy; p.life -= 0.02;
            if(p.life <= 0) particles.splice(i, 1);
        });
    }

    function endGame() {
        gameOver = true;
        playSound('over');
        scoreAnim.opacity = 0;
        
        let savedHighScore = parseInt(localStorage.getItem(STORAGE_KEY)) || 0;
        
        if (score > savedHighScore) {
            savedHighScore = score;
            localStorage.setItem(STORAGE_KEY, savedHighScore.toString());
            highScoreText.innerHTML = `${savedHighScore} <span style="color:#2ecc71;font-size:12px">NEW!</span>`;
        } else {
            highScoreText.innerText = savedHighScore;
        }

        startHighScoreText.innerText = savedHighScore;
        finalScoreText.innerText = score;
        gameOverModal.classList.add("show");
    }

    function drawScoreText() {
        if (scoreAnim.opacity <= 0) return;
        
        ctx.save();
        ctx.globalAlpha = scoreAnim.opacity;
        ctx.fillStyle = "#f1c40f";
        ctx.textAlign = "center";
        ctx.textBaseline = "top"; 
        ctx.font = `900 ${80 * scoreAnim.scale}px 'Segoe UI', sans-serif`;
        
        ctx.shadowColor = "rgba(0, 0, 0, 0.8)";
        ctx.shadowBlur = 15;
        // キャンバス上部中央に配置
        ctx.fillText(scoreAnim.val, canvas.width / 2, 20);
        ctx.restore();
    }

    function drawSoccerBall(x, y, radius, angle) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(-radius*0.3, -radius*0.3, radius*0.1, 0, 0, radius);
        grad.addColorStop(0, "#fff");
        grad.addColorStop(1, "#999");
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = "#000";
        ctx.stroke();
        ctx.fillStyle = "#222";
        for (let i = 0; i < 5; i++) {
            ctx.beginPath();
            const a = (Math.PI * 2 / 5) * i;
            ctx.arc(Math.cos(a) * radius * 0.6, Math.sin(a) * radius * 0.6, radius * 0.25, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }

    function drawCharacter(x, y, w, h) {
        ctx.save();
        ctx.fillStyle = "#3498db";
        ctx.beginPath();
        ctx.roundRect(x - w/2.5, y - h/2.5, w/1.25, h/2, 5);
        ctx.fill();
        ctx.fillStyle = paddle.color;
        ctx.beginPath();
        ctx.ellipse(x, y - h/1.5, w/2.2, h/2.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(x - 8, y - h/1.5 - 5, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 8, y - h/1.5 - 5, 2.5, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 1;
        ctx.beginPath(); ctx.arc(x, y - h/1.5 + 5, 6, 0.2, Math.PI - 0.2); ctx.stroke();
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        // 1. 背景グリッド
        ctx.strokeStyle = "rgba(255,255,255,0.05)";
        ctx.lineWidth = 1;
        for(let i=0; i<canvas.width; i+=40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for(let i=0; i<canvas.height; i+=40) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }

        // 2. スコア表示（最前面のボール/キャラより後ろに描画）
        drawScoreText();

        // 3. パーティクル
        particles.forEach(p => {
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        });

        // 4. キャラクター
        drawCharacter(paddle.x, paddle.y, paddle.w, paddle.h);
        
        // 5. ボール（常に前景）
        balls.forEach(ball => drawSoccerBall(ball.x, ball.y, ball.radius, ball.angle));
    }

    function gameLoop() {
        if (!gameOver) {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    }

    window.onload = function() {
        const savedHighScore = localStorage.getItem(STORAGE_KEY) || "0";
        startHighScoreText.innerText = savedHighScore;
        draw();
    };
</script>
</body>
</html>
