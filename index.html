<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ヘディング - Pro Heading Game</title>
    <style>
        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background-color: #2c3e50;
            color: white;
            font-family: 'Helvetica Neue', Arial, sans-serif;
            overflow-y: auto;
            touch-action: none;
        }

        #game-title {
            font-size: 42px;
            font-weight: 900;
            margin: 10px 0 5px 0;
            color: #f1c40f;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            letter-spacing: 4px;
        }

        #ui-container {
            text-align: center;
            margin-bottom: 10px;
            width: 100%;
            max-width: 480px;
        }

        #scoreDisplay { font-size: 28px; margin: 5px 0; color: #fff; }
        #highScoreDisplay { font-size: 14px; color: #bdc3c7; margin-bottom: 5px; }

        #resetBtn {
            background-color: #e67e22;
            border: none;
            color: white;
            padding: 5px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            margin-bottom: 5px;
        }

        canvas {
            border: 4px solid #ecf0f1;
            background-color: #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            max-width: 90vw;
            max-height: 45vh;
            display: block;
        }

        #controller {
            display: flex;
            width: 100%;
            max-width: 480px;
            justify-content: center;
            gap: 10px;
            padding: 15px 0;
            user-select: none;
        }

        .btn {
            width: 45%;
            height: 70px;
            background-color: #34495e;
            border: 2px solid #ecf0f1;
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: bold;
            font-size: 20px;
            transition: all 0.1s;
            cursor: pointer;
            touch-action: none;
            -webkit-tap-highlight-color: transparent;
        }

        .btn.active {
            background-color: #3498db;
            box-shadow: 0 0 20px #3498db;
            transform: scale(0.95);
            border-color: #fff;
        }

        #how-to-play {
            width: 90%;
            max-width: 480px;
            background-color: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            padding: 15px;
            margin-top: 10px;
            margin-bottom: 30px;
            font-size: 13px;
            line-height: 1.6;
            color: #ecf0f1;
            border-left: 4px solid #f1c40f;
        }

        .how-to-title {
            font-weight: bold;
            color: #f1c40f;
            margin-bottom: 8px;
            display: block;
            font-size: 15px;
        }

        kbd {
            background-color: #eee;
            border-radius: 3px;
            border: 1px solid #b4b4b4;
            color: #333;
            display: inline-block;
            font-size: .85em;
            padding: 2px 4px;
        }
    </style>
</head>
<body>

    <h1 id="game-title">ヘディング</h1>

    <div id="ui-container">
        <div id="highScoreDisplay">High Score: 0</div>
        <h1 id="scoreDisplay">Score: 0</h1>
        <button id="resetBtn">Reset High Score</button>
    </div>
    
    <canvas id="gameCanvas"></canvas>

    <div id="controller">
        <div id="btnLeft" class="btn">LEFT</div>
        <div id="btnRight" class="btn">RIGHT</div>
    </div>

    <div id="how-to-play">
        <span class="how-to-title">⚽ 遊び方</span>
        <div style="display: flex; justify-content: space-between; gap: 15px;">
            <div>
                <strong>【PC】</strong><br>
                ・<kbd>←</kbd> <kbd>→</kbd> キーで移動<br>
                ・<kbd>Space</kbd> でリスタート
            </div>
            <div>
                <strong>【スマホ】</strong><br>
                ・下のボタンで移動<br>
                ・画面タップでリスタート
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreDisplay = document.getElementById("scoreDisplay");
    const highScoreDisplay = document.getElementById("highScoreDisplay");
    const resetBtn = document.getElementById("resetBtn");
    const btnLeft = document.getElementById("btnLeft");
    const btnRight = document.getElementById("btnRight");

    canvas.width = 480;
    canvas.height = 640;

    let score = 0;
    let highScore = localStorage.getItem("bounceHighScore") || 0;
    let gameOver = false;

    const targetFps = 60;
    const fpsInterval = 1000 / targetFps;
    let then = performance.now();

    highScoreDisplay.innerText = `High Score: ${highScore}`;

    const paddle = {
        radiusX: 28,
        radiusY: 38,
        x: canvas.width / 2,
        y: canvas.height - 10,
        speed: 10, 
        dx: 0
    };

    const ball = {
        x: canvas.width / 2,
        y: 150,
        radius: 23,
        dx: 4,
        dy: 0,
        angle: 0, 
        gravity: 0.20, // 少し滞空時間を伸ばすため微減
        fixedLaunchSpeed: -14.2 // ★ここを強化してより高く上がるようにしました
    };

    const input = { left: false, right: false };

    function updateInput() {
        if (input.left) paddle.dx = -paddle.speed;
        else if (input.right) paddle.dx = paddle.speed;
        else paddle.dx = 0;
        
        btnLeft.classList.toggle('active', input.left);
        btnRight.classList.toggle('active', input.right);
    }

    function resetGame() {
        score = 0;
        scoreDisplay.innerText = `Score: ${score}`;
        gameOver = false;
        ball.x = canvas.width / 2;
        ball.y = 150;
        ball.dx = (Math.random() > 0.5 ? 4 : -4);
        ball.dy = 0;
        ball.angle = 0; 
        paddle.x = canvas.width / 2;
        then = performance.now();
        requestAnimationFrame(gameLoop);
    }

    document.addEventListener("keydown", (e) => {
        if (e.key === "ArrowLeft") input.left = true;
        if (e.key === "ArrowRight") input.right = true;
        if (gameOver && (e.key === " " || e.key === "Enter")) resetGame();
    });

    document.addEventListener("keyup", (e) => {
        if (e.key === "ArrowLeft") input.left = false;
        if (e.key === "ArrowRight") input.right = false;
    });

    function bindButton(element, direction) {
        const start = (e) => { e.preventDefault(); if(gameOver) resetGame(); else input[direction] = true; };
        const end = (e) => { e.preventDefault(); input[direction] = false; };
        element.addEventListener("touchstart", start, {passive: false});
        element.addEventListener("touchend", end, {passive: false});
        element.addEventListener("mousedown", start);
        window.addEventListener("mouseup", () => { input[direction] = false; });
    }

    bindButton(btnLeft, 'left');
    bindButton(btnRight, 'right');

    function update() {
        if (gameOver) return;
        updateInput();
        paddle.x += paddle.dx;
        if (paddle.x - paddle.radiusX < 0) paddle.x = paddle.radiusX;
        if (paddle.x + paddle.radiusX > canvas.width) paddle.x = canvas.width - paddle.radiusX;

        ball.dy += ball.gravity;
        ball.x += ball.dx;
        ball.y += ball.dy;
        ball.angle += ball.dx / ball.radius;

        if (ball.x + ball.radius > canvas.width || ball.x - ball.radius < 0) {
            ball.dx *= -1;
            ball.x = (ball.x < ball.radius) ? ball.radius : canvas.width - ball.radius;
        }

        const ballBottom = ball.y + ball.radius;
        const headTop = paddle.y - paddle.radiusY;
        
        if (
            ball.dy > 0 &&
            ballBottom > headTop && 
            ballBottom < headTop + ball.dy + 15 &&
            ball.x > paddle.x - paddle.radiusX - 5 && 
            ball.x < paddle.x + paddle.radiusX + 5
        ) {
            const hitPos = (ball.x - paddle.x) / paddle.radiusX;
            ball.dy = ball.fixedLaunchSpeed; 
            ball.dx = hitPos * 10; 
            ball.y = headTop - ball.radius;
            score++;
            scoreDisplay.innerText = `Score: ${score}`;
        }

        if (ball.y - ball.radius > canvas.height) {
            gameOver = true;
            if (score > highScore) {
                highScore = score;
                localStorage.setItem("bounceHighScore", highScore);
                highScoreDisplay.innerText = `High Score: ${highScore}`;
            }
        }
    }

    function drawSoccerBall(x, y, radius, angle) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle); 
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        ctx.fillStyle = "#fff";
        ctx.fill();
        ctx.strokeStyle = "#ccc";
        ctx.stroke();
        ctx.fillStyle = "#333";
        for (let i = 0; i < 6; i++) {
            const a = (Math.PI * 2 / 6) * i;
            const dist = (i === 0) ? 0 : radius * 0.7;
            ctx.save();
            ctx.translate(Math.cos(a) * dist, Math.sin(a) * dist);
            ctx.beginPath();
            for(let j=0; j<5; j++){
                const ang = (Math.PI*2/5)*j;
                ctx.lineTo(Math.cos(ang)*radius*0.3, Math.sin(ang)*radius*0.3);
            }
            ctx.fill();
            ctx.restore();
        }
        ctx.restore();
    }

    function drawHead(x, y, radiusX, radiusY) {
        ctx.save();
        ctx.beginPath();
        ctx.fillStyle = "#ffdbac"; 
        ctx.ellipse(x, y, radiusX, radiusY, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = "#e0ac69";
        ctx.lineWidth = 2;
        ctx.stroke();
        
        ctx.fillStyle = "#333"; 
        ctx.beginPath(); ctx.arc(x - 10, y - 18, 4, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 10, y - 18, 4, 0, Math.PI * 2); ctx.fill();
        
        ctx.beginPath();
        ctx.strokeStyle = "#d2b48c";
        ctx.lineWidth = 2;
        ctx.moveTo(x, y - 5);
        ctx.lineTo(x - 3, y + 2);
        ctx.lineTo(x, y + 2);
        ctx.stroke();
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        drawHead(paddle.x, paddle.y, paddle.radiusX, paddle.radiusY);
        drawSoccerBall(ball.x, ball.y, ball.radius, ball.angle);
        if (gameOver) {
            ctx.fillStyle = "rgba(0,0,0,0.8)";
            ctx.fillRect(0,0,canvas.width,canvas.height);
            ctx.fillStyle = "white";
            ctx.textAlign = "center";
            ctx.font = "bold 36px Arial";
            ctx.fillText("GAME OVER", 240, 280);
            ctx.fillText(`Score: ${score}`, 240, 330);
        }
    }

    function gameLoop(timestamp) {
        if (!gameOver) requestAnimationFrame(gameLoop);
        const elapsed = timestamp - then;
        if (elapsed >= fpsInterval) {
            then = timestamp - (elapsed % fpsInterval);
            update();
            draw();
        }
    }
    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
