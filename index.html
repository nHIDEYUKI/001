<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HEADING MASTER</title>
    <style>
        :root {
            --primary: #f1c40f;
            --bg: #1a1a2e;
            --accent: #3498db;
            --danger: #e74c3c;
            --text-muted: #dcdde1;
            --white: #ffffff;
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
        }

        #game-title {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.6);
        }

        #canvas-container {
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 10px;
            border: 2px solid rgba(255,255,255,0.1);
        }

        canvas {
            background: radial-gradient(circle at 50% 30%, #2c3e50 0%, #000 100%);
            display: block;
            touch-action: none;
        }

        #controls {
            width: 100%;
            max-width: 480px;
            padding: 25px;
            box-sizing: border-box;
            position: relative;
        }

        .control-bar {
            width: 100%;
            height: 80px;
            background: rgba(255, 255, 255, 0.08);
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-radius: 40px;
            display: grid;
            /* STOP領域を狭めるため、1fr 0.4fr 1fr の比率に設定 (元は等間隔) */
            grid-template-columns: 1fr 0.4fr 1fr;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .control-zone {
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
            font-weight: 900;
            font-size: 14px;
            opacity: 0.4;
            transition: all 0.15s;
            pointer-events: none;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
        }

        .control-zone:last-child {
            border-right: none;
        }

        .control-zone.active {
            background: var(--accent);
            opacity: 1;
            font-size: 18px;
            box-shadow: inset 0 0 20px rgba(255, 255, 255, 0.2);
        }

        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }

        .modal.show {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            text-align: center;
            padding: 40px 30px;
            background: #222;
            border-radius: 30px;
            border: 3px solid var(--primary);
            width: 90%;
            max-width: 440px;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }

        .modal-title {
            font-size: 36px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .instruction-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 10px;
            margin: 25px 0;
            padding: 15px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }

        .instruction-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }

        .instruction-label {
            font-size: 12px;
            color: var(--white);
            font-weight: bold;
            text-transform: uppercase;
        }

        .key-visual {
            display: flex;
            gap: 4px;
        }

        .key {
            background: #444;
            border: 2px solid #777;
            border-radius: 6px;
            padding: 4px 8px;
            font-size: 14px;
            font-weight: bold;
            box-shadow: 0 2px 0 #111;
        }

        .touch-visual {
            position: relative;
            width: 50px;
            height: 30px;
            background: rgba(255,255,255,0.15);
            border-radius: 15px;
        }

        .tilt-visual {
            width: 40px;
            height: 40px;
            animation: tiltAnim 2s infinite ease-in-out;
        }

        @keyframes tiltAnim {
            0% { transform: rotate(-20deg); }
            50% { transform: rotate(20deg); }
            100% { transform: rotate(-20deg); }
        }

        .touch-hand {
            position: absolute;
            left: 50%;
            top: 50%;
            transform: translate(-50%, -50%);
            animation: slideHand 2s infinite ease-in-out;
        }

        @keyframes slideHand {
            0% { transform: translate(-100%, -50%); }
            50% { transform: translate(40%, -50%); }
            100% { transform: translate(-100%, -50%); }
        }

        .score-row {
            margin: 15px 0;
            font-size: 24px;
            font-weight: 600;
        }

        .highscore-row {
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 30px;
            font-size: 26px;
        }

        .action-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 18px 40px;
            font-size: 22px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #c7a40c;
            transition: all 0.1s;
            width: 100%;
            margin-bottom: 10px;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #c7a40c;
        }

        .footer-note {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 15px;
            font-weight: 500;
        }

        .keyboard-hint {
            display: block;
            margin-top: 20px;
            font-size: 16px;
            color: var(--text-muted);
            font-weight: 500;
        }

        .keyboard-hint .key-small {
            background: #555;
            border: 1px solid #888;
            border-radius: 4px;
            padding: 3px 10px;
            margin: 0 4px;
            color: #fff;
            font-size: 15px;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <div id="header">
        <h1 id="game-title">HEADING MASTER</h1>
    </div>

    <div id="canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="controls">
        <div id="controlBar" class="control-bar">
            <div id="zoneLeft" class="control-zone">LEFT</div>
            <div id="zoneStop" class="control-zone">STOP</div>
            <div id="zoneRight" class="control-zone">RIGHT</div>
        </div>
    </div>

    <div id="startModal" class="modal show">
        <div class="modal-content">
            <div class="modal-title">READY?</div>
            <div class="score-row highscore-row">HIGH SCORE: <span id="startHighScore">0</span></div>
            
            <div class="instruction-grid">
                <div class="instruction-item">
                    <span class="instruction-label">Keyboard</span>
                    <div class="key-visual">
                        <span class="key">←</span>
                        <span class="key">→</span>
                    </div>
                    <span style="font-size: 11px;">Arrows</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-label">Touch</span>
                    <div class="touch-visual">
                        <div class="touch-hand">
                            <svg width="20" height="20" viewBox="0 0 24 24" fill="white">
                                <path d="M9 11.24V7.5a2.5 2.5 0 0 1 5 0v3.74c1.21-.81 2-2.18 2-3.74C16 5.01 13.99 3 11.5 3S7 5.01 7 7.5c0 1.56.79 2.93 2 3.74zm9.84 4.63l-4.54-2.26c-.17-.07-.35-.11-.54-.11H13v-6c0-.83-.67-1.5-1.5-1.5S10 6.67 10 7.5v10.74c-3.6-.76-3.54-.75-3.67-.75-.31 0-.59.13-.79.33l-.79.8 4.94 4.94c.27.27.65.44 1.06.44h6.75c.75 0 1.36-.54 1.48-1.25l.47-3.21c.08-.51-.14-1.02-.58-1.27z"/>
                            </svg>
                        </div>
                    </div>
                    <span style="font-size: 11px;">Slide Bar</span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-label">Tilt</span>
                    <div class="tilt-visual">
                        <svg width="40" height="40" viewBox="0 0 24 24" fill="white">
                            <path d="M17,1H7C5.34,1,4,2.34,4,4v16c0,1.66,1.34,3,3,3h10c1.66,0,3-1.34,3-3V4C20,2.34,18.66,1,17,1z M17,21H7c-0.55,0-1-0.45-1-1v-1 h12v1C18,20.55,17.55,21,17,21z M18,17H6V7h12V17z M18,5H6V4c0-0.55,0.45-1,1-1h10c0.55,0,1,0.45,1,1V5z"/>
                        </svg>
                    </div>
                    <span style="font-size: 11px;">Phone Tilt</span>
                </div>
            </div>

            <button class="action-btn" onclick="requestPermissionAndStart()">PLAY NOW</button>
            <p class="footer-note">Use arrows, touch bar, or tilt your device!</p>
        </div>
    </div>

    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">GAME OVER</div>
            <div class="score-row">Score: <span id="finalScore">0</span></div>
            <div class="score-row highscore-row">HIGH SCORE: <span id="highScore">0</span></div>
            <button class="action-btn" onclick="resetGame()">RETRY</button>
            <span class="keyboard-hint">or press <span class="key-small">Space key</span></span>
        </div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startModal = document.getElementById("startModal");
    const gameOverModal = document.getElementById("gameOverModal");
    const finalScoreText = document.getElementById("finalScore");
    const highScoreText = document.getElementById("highScore");
    const startHighScoreText = document.getElementById("startHighScore");
    const controlBar = document.getElementById("controlBar");
    const zoneLeft = document.getElementById("zoneLeft");
    const zoneStop = document.getElementById("zoneStop");
    const zoneRight = document.getElementById("zoneRight");

    const STORAGE_KEY = 'heading_master_highscore_v1';
    let audioCtx;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSound(type, comboCount = 0) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'hit') {
            osc.type = 'sine';
            const freq = 400 + (Math.min(comboCount, 15) * 30);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } 
        else if (type === 'wall') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(600, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.05);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.05);
        }
        else if (type === 'over') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }
    }

    const baseWidth = 400;
    const baseHeight = 500;
    const scale = Math.min(window.innerWidth * 0.95 / baseWidth, window.innerHeight * 0.55 / baseHeight);
    canvas.width = baseWidth;
    canvas.height = baseHeight;
    canvas.style.width = (baseWidth * scale) + "px";
    canvas.style.height = (baseHeight * scale) + "px";

    let score = 0;
    let combo = 0;
    let gameOver = true; 
    let gameStarted = false;
    let particles = [];
    let balls = [];
    let lastSpawnTime = 0;
    let isTouchMode = false; 
    let tiltDx = 0; 
    
    const scoreAnim = {
        val: 0,
        opacity: 0,
        scale: 1.0,
        startTime: 0
    };

    const SPAWN_INTERVAL = 3000; 
    const MAX_BALLS = 10;        

    const paddle = {
        w: 60,
        h: 70,
        x: canvas.width / 2,
        y: canvas.height - 10,
        baseSpeed: 4, 
        speed: 4,     
        dx: 0,
        color: "#ffdbac"
    };

    function createBall() {
        return {
            x: Math.random() * (canvas.width - 60) + 30,
            y: -30,
            radius: 26,
            dx: (Math.random() - 0.5) * 6,
            dy: 2,
            gravity: 0.22,
            friction: 0.995,
            bounce: -13,
            angle: 0,
            rotationSpeed: (Math.random() - 0.5) * 0.2
        };
    }

    const keys = { left: false, right: false };

    function createParticles(x, y, color) {
        for(let i=0; i<8; i++) {
            particles.push({
                x: x, y: y,
                dx: (Math.random() - 0.5) * 8,
                dy: (Math.random() - 0.5) * 8,
                life: 1.0, color: color
            });
        }
    }

    function checkBallCollision(b1, b2) {
        const dx = b2.x - b1.x;
        const dy = b2.y - b1.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < b1.radius + b2.radius) {
            const angle = Math.atan2(dy, dx);
            const sin = Math.sin(angle);
            const cos = Math.cos(angle);
            const overlap = (b1.radius + b2.radius - dist) / 2;
            b1.x -= overlap * cos;
            b1.y -= overlap * sin;
            b2.x += overlap * cos;
            b2.y += overlap * sin;
            const v1 = b1.dx * cos + b1.dy * sin;
            const v2 = b2.dx * cos + b2.dy * sin;
            b1.dx = b1.dx - (v1 - v2) * cos;
            b1.dy = b1.dy - (v1 - v2) * sin;
            b2.dx = b2.dx + (v1 - v2) * cos;
            b2.dy = b2.dy + (v1 - v2) * sin;
            playSound('wall');
        }
    }

    async function requestPermissionAndStart() {
        initAudio();
        
        if (typeof DeviceOrientationEvent !== 'undefined' && typeof DeviceOrientationEvent.requestPermission === 'function') {
            try {
                const permission = await DeviceOrientationEvent.requestPermission();
                if (permission === 'granted') {
                    window.addEventListener('deviceorientation', handleOrientation);
                }
            } catch (err) {
                console.error("Orientation permission error:", err);
            }
        } else {
            window.addEventListener('deviceorientation', handleOrientation);
        }
        
        startGame();
    }

    function handleOrientation(event) {
        if (gameOver) return;
        
        let g = event.gamma;
        if (g === null) return;

        const deadzone = 5;
        const maxTilt = 35;
        
        if (Math.abs(g) > deadzone) {
            let normalized = (Math.abs(g) - deadzone) / (maxTilt - deadzone);
            normalized = Math.min(1.0, Math.max(0, normalized));
            if (g < 0) normalized *= -1;
            
            tiltDx = normalized * paddle.speed;
            
            if (!isTouchMode && !keys.left && !keys.right) {
                zoneLeft.classList.toggle('active', g < -deadzone);
                zoneRight.classList.toggle('active', g > deadzone);
                zoneStop.classList.toggle('active', Math.abs(g) <= deadzone);
            }
        } else {
            tiltDx = 0;
            if (!isTouchMode && !keys.left && !keys.right) {
                zoneLeft.classList.remove('active');
                zoneRight.classList.remove('active');
                zoneStop.classList.add('active');
            }
        }
    }

    function startGame() {
        gameStarted = true;
        startModal.classList.remove("show");
        resetGame();
    }

    function resetGame() {
        initAudio();
        score = 0;
        combo = 0;
        gameOver = false;
        gameOverModal.classList.remove("show");
        scoreAnim.opacity = 0;
        balls = [createBall()];
        lastSpawnTime = Date.now();
        paddle.x = canvas.width / 2;
        particles = [];
        requestAnimationFrame(gameLoop);
    }

    function updateVisualFeedback() {
        if (isTouchMode) return; 

        zoneLeft.classList.remove('active');
        zoneStop.classList.remove('active');
        zoneRight.classList.remove('active');

        if (keys.left && !keys.right) {
            zoneLeft.classList.add('active');
        } else if (keys.right && !keys.left) {
            zoneRight.classList.add('active');
        } else {
            zoneStop.classList.add('active');
        }
    }

    window.addEventListener("keydown", e => {
        isTouchMode = false;
        if(e.key === "ArrowLeft") keys.left = true;
        if(e.key === "ArrowRight") keys.right = true;
        updateVisualFeedback();
        
        if(e.key === " " || e.key === "Enter") {
            if(!gameStarted) requestPermissionAndStart();
            else if(gameOver) resetGame();
        }
    });
    window.addEventListener("keyup", e => {
        if(e.key === "ArrowLeft") keys.left = false;
        if(e.key === "ArrowRight") keys.right = false;
        updateVisualFeedback();
    });

    function handlePointer(e) {
        e.preventDefault();
        if (gameOver) return;
        isTouchMode = true;

        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const rect = controlBar.getBoundingClientRect();
        const relX = clientX - rect.left;
        const width = rect.width;

        zoneLeft.classList.remove('active');
        zoneStop.classList.remove('active');
        zoneRight.classList.remove('active');

        if (relX >= 0 && relX <= width) {
            // STOP領域を狭く設定したグリッド (1fr 0.4fr 1fr) に合わせた判定ロジック
            // 全体の幅を 2.4ユニット (1 + 0.4 + 1) とみなす
            const unit = width / 2.4;
            const leftBoundary = unit;            // 左端から 1ユニット分
            const rightBoundary = unit * 1.4;     // 左端から 1.4ユニット分

            if (relX < leftBoundary) {
                keys.left = true;
                keys.right = false;
                zoneLeft.classList.add('active');
            } else if (relX < rightBoundary) {
                keys.left = false;
                keys.right = false;
                zoneStop.classList.add('active');
            } else {
                keys.left = false;
                keys.right = true;
                zoneRight.classList.add('active');
            }
        }
    }

    function clearPointer(e) {
        isTouchMode = false;
        keys.left = false;
        keys.right = false;
        updateVisualFeedback();
    }

    controlBar.addEventListener("touchstart", handlePointer, {passive: false});
    controlBar.addEventListener("touchmove", handlePointer, {passive: false});
    controlBar.addEventListener("touchend", clearPointer, {passive: false});
    controlBar.addEventListener("touchcancel", clearPointer, {passive: false});

    controlBar.addEventListener("mousedown", handlePointer);
    window.addEventListener("mousemove", (e) => {
        if (e.buttons === 1) handlePointer(e);
    });
    window.addEventListener("mouseup", clearPointer);

    function update() {
        if (gameOver) return;

        paddle.speed = paddle.baseSpeed + (balls.length * 3.0);

        if (Date.now() - lastSpawnTime > SPAWN_INTERVAL && balls.length < MAX_BALLS) {
            balls.push(createBall());
            lastSpawnTime = Date.now();
        }

        if (keys.left) {
            paddle.dx = -paddle.speed;
        } else if (keys.right) {
            paddle.dx = paddle.speed;
        } else if (Math.abs(tiltDx) > 0.1) {
            paddle.dx = tiltDx;
        } else {
            paddle.dx *= 0.8;
        }
        
        paddle.x += paddle.dx;
        paddle.x = Math.max(paddle.w/2, Math.min(canvas.width - paddle.w/2, paddle.x));

        if (scoreAnim.opacity > 0) {
            const elapsed = Date.now() - scoreAnim.startTime;
            if (elapsed > 100) { 
                scoreAnim.opacity -= 0.015; 
                scoreAnim.scale += 0.002;
            }
        }

        for (let i = balls.length - 1; i >= 0; i--) {
            let ball = balls[i];
            ball.dy += ball.gravity;
            ball.x += ball.dx;
            ball.y += ball.dy;
            ball.angle += ball.rotationSpeed;
            ball.dx *= ball.friction;

            if (ball.x < ball.radius || ball.x > canvas.width - ball.radius) {
                ball.dx *= -0.8;
                ball.x = ball.x < ball.radius ? ball.radius : canvas.width - ball.radius;
                ball.rotationSpeed *= -1;
                playSound('wall');
            }
            if (ball.y < ball.radius) {
                ball.dy *= -0.8;
                ball.y = ball.radius;
                playSound('wall');
            }

            const headTop = paddle.y - paddle.h;
            if (ball.dy > 0 && ball.y + ball.radius > headTop && ball.y < paddle.y &&
                Math.abs(ball.x - paddle.x) < paddle.w/2 + ball.radius) {
                
                const diff = ball.x - paddle.x;
                ball.dx = diff * 0.25 + paddle.dx * 0.5;
                ball.dy = ball.bounce;
                ball.y = headTop - ball.radius;
                ball.rotationSpeed = ball.dx * 0.05;

                score++;
                combo++;
                
                scoreAnim.val = score;
                scoreAnim.opacity = 1.0;
                scoreAnim.scale = 1.0;
                scoreAnim.startTime = Date.now();
                
                createParticles(ball.x, ball.y + ball.radius, "#f1c40f");
                playSound('hit', combo);
            }

            for (let j = i - 1; j >= 0; j--) {
                checkBallCollision(ball, balls[j]);
            }

            if (ball.y > canvas.height + 50) {
                balls.splice(i, 1);
                combo = 0; 
                if (balls.length === 0) {
                    endGame();
                }
            }
        }

        particles.forEach((p, i) => {
            p.x += p.dx; p.y += p.dy; p.life -= 0.02;
            if(p.life <= 0) particles.splice(i, 1);
        });
    }

    function endGame() {
        gameOver = true;
        playSound('over');
        scoreAnim.opacity = 0;
        
        let savedHighScore = parseInt(localStorage.getItem(STORAGE_KEY)) || 0;
        
        if (score > savedHighScore) {
            savedHighScore = score;
            localStorage.setItem(STORAGE_KEY, savedHighScore.toString());
            highScoreText.innerHTML = `${savedHighScore} <span style="color:#2ecc71;font-size:16px">NEW!</span>`;
        } else {
            highScoreText.innerText = savedHighScore;
        }

        startHighScoreText.innerText = savedHighScore;
        finalScoreText.innerText = score;
        gameOverModal.classList.add("show");
    }

    function drawScoreText() {
        if (scoreAnim.opacity <= 0) return;
        
        ctx.save();
        ctx.globalAlpha = scoreAnim.opacity;
        ctx.fillStyle = "#f1c40f";
        ctx.textAlign = "center";
        ctx.textBaseline = "top"; 
        ctx.font = `900 ${100 * scoreAnim.scale}px 'Segoe UI', sans-serif`;
        
        ctx.shadowColor = "rgba(0, 0, 0, 0.9)";
        ctx.shadowBlur = 20;
        ctx.fillText(scoreAnim.val, canvas.width / 2, 30);
        ctx.restore();
    }

    function drawSoccerBall(x, y, radius, angle) {
        ctx.save();
        ctx.translate(x, y);
        ctx.rotate(angle);
        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(-radius*0.3, -radius*0.3, radius*0.1, 0, 0, radius);
        grad.addColorStop(0, "#fff");
        grad.addColorStop(1, "#888");
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.fillStyle = "#222";
        for (let i = 0; i < 5; i++) {
            ctx.beginPath();
            const a = (Math.PI * 2 / 5) * i;
            ctx.arc(Math.cos(a) * radius * 0.6, Math.sin(a) * radius * 0.6, radius * 0.28, 0, Math.PI * 2);
            ctx.fill();
        }
        ctx.restore();
    }

    function drawCharacter(x, y, w, h) {
        ctx.save();
        ctx.fillStyle = "#3498db";
        ctx.beginPath();
        ctx.roundRect(x - w/2.5, y - h/2.5, w/1.25, h/2, 5);
        ctx.fill();
        ctx.fillStyle = paddle.color;
        ctx.beginPath();
        ctx.ellipse(x, y - h/1.5, w/2.2, h/2.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(x - 8, y - h/1.5 - 5, 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 8, y - h/1.5 - 5, 3, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(x, y - h/1.5 + 5, 7, 0.2, Math.PI - 0.2); ctx.stroke();
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 1.5;
        for(let i=0; i<canvas.width; i+=40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for(let i=0; i<canvas.height; i+=40) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.height, i); ctx.stroke();
        }

        drawScoreText();

        particles.forEach(p => {
            ctx.save();
            ctx.globalAlpha = p.life;
            ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill();
            ctx.restore();
        });

        drawCharacter(paddle.x, paddle.y, paddle.w, paddle.h);
        balls.forEach(ball => drawSoccerBall(ball.x, ball.y, ball.radius, ball.angle));
    }

    function gameLoop() {
        if (!gameOver) {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    }

    window.onload = function() {
        const savedHighScore = localStorage.getItem(STORAGE_KEY) || "0";
        startHighScoreText.innerText = savedHighScore;
        updateVisualFeedback(); 
        draw();
    };
</script>
</body>
