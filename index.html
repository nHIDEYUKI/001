<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>HEADING MASTER</title>
    <style>
        :root {
            --primary: #f1c40f;
            --bg: #1a1a2e;
            --accent: #3498db;
            --danger: #e74c3c;
            --text-muted: #dcdde1;
            --white: #ffffff;
            --panel-bg: rgba(255, 255, 255, 0.08);
        }

        body {
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            align-items: center;
            min-height: 100vh;
            background-color: var(--bg);
            color: var(--white);
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            overflow: hidden;
            touch-action: none;
        }

        #header {
            width: 100%;
            padding: 20px 0;
            text-align: center;
            background: linear-gradient(to bottom, rgba(0,0,0,0.6), transparent);
        }

        #game-title {
            font-size: 32px;
            font-weight: 900;
            margin: 0;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 3px;
            text-shadow: 0 0 15px rgba(241, 196, 15, 0.6);
        }

        #canvas-container {
            position: relative;
            box-shadow: 0 0 40px rgba(0,0,0,0.7);
            border-radius: 12px;
            overflow: hidden;
            margin-top: 10px;
            border: 2px solid rgba(255,255,255,0.1);
        }

        canvas {
            background: radial-gradient(circle at 50% 30%, #2c3e50 0%, #000 100%);
            display: block;
            touch-action: none;
        }

        #controls {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            width: 100%;
        }

        .control-bar {
            /* JavaScriptでキャンバス幅と同期 */
            height: 70px;
            background: var(--panel-bg);
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 15px;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            box-sizing: border-box;
        }

        .arrow-display {
            position: absolute;
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }

        .arrow-icon {
            width: 44px;
            height: 44px;
            fill: none;
            stroke: var(--white);
            stroke-width: 3;
            stroke-linecap: round;
            stroke-linejoin: round;
            opacity: 0;
            transform: scale(0.5);
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .arrow-icon.active {
            opacity: 1;
            transform: scale(1.1);
            filter: drop-shadow(0 0 10px rgba(255,255,255,0.6));
        }

        .control-label {
            color: rgba(255,255,255,0.3);
            font-weight: 800;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: opacity 0.2s;
        }

        .control-label.hidden {
            opacity: 0;
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.92);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 100;
            visibility: hidden;
            opacity: 0;
            transition: 0.3s;
        }

        .modal.show {
            visibility: visible;
            opacity: 1;
        }

        .modal-content {
            text-align: center;
            padding: 40px 30px;
            background: #222;
            border-radius: 30px;
            border: 3px solid var(--primary);
            width: 90%;
            max-width: 440px;
            box-shadow: 0 0 60px rgba(0,0,0,0.8);
        }

        .modal-title {
            font-size: 36px;
            font-weight: 900;
            color: var(--primary);
            margin-bottom: 15px;
            letter-spacing: 1px;
        }

        .instruction-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 25px 0;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 20px;
        }

        .instruction-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .instruction-label {
            font-size: 12px;
            color: var(--white);
            font-weight: bold;
            text-transform: uppercase;
        }

        .key-visual {
            display: flex;
            gap: 4px;
        }

        .key {
            background: #444;
            border: 2px solid #777;
            border-radius: 6px;
            padding: 4px 12px;
            font-size: 16px;
            font-weight: bold;
            box-shadow: 0 2px 0 #111;
        }

        .key.highlight {
            background: var(--accent);
            border-color: #fff;
            color: #fff;
        }

        .score-row {
            margin: 15px 0;
            font-size: 24px;
            font-weight: 600;
        }

        .highscore-row {
            color: var(--primary);
            font-weight: 800;
            margin-bottom: 30px;
            font-size: 26px;
        }

        .action-btn {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 18px 40px;
            font-size: 22px;
            font-weight: 900;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 8px 0 #c7a40c;
            transition: all 0.1s;
            width: 100%;
            margin-bottom: 10px;
        }

        .action-btn:active {
            transform: translateY(4px);
            box-shadow: 0 4px 0 #c7a40c;
        }

        .footer-note {
            font-size: 14px;
            color: var(--text-muted);
            margin-top: 15px;
            font-weight: 500;
        }
    </style>
</head>
<body>

    <div id="header">
        <h1 id="game-title">HEADING MASTER</h1>
    </div>

    <div id="canvas-container">
        <canvas id="gameCanvas"></canvas>
    </div>

    <div id="controls">
        <div id="controlBar" class="control-bar">
            <span id="controlLabel" class="control-label">READY</span>
            
            <div class="arrow-display">
                <!-- Left Arrow Icon (Center) -->
                <svg id="arrowLeft" class="arrow-icon" viewBox="0 0 24 24">
                    <path d="M19 12H5M5 12L12 19M5 12L12 5"/>
                </svg>
                
                <!-- Right Arrow Icon (Center) -->
                <svg id="arrowRight" class="arrow-icon" viewBox="0 0 24 24">
                    <path d="M5 12H19M19 12L12 5M19 12L12 19"/>
                </svg>
            </div>
        </div>
    </div>

    <div id="startModal" class="modal show">
        <div class="modal-content">
            <div class="modal-title">NEW CONTROLS</div>
            <div class="score-row highscore-row">HIGH SCORE: <span id="startHighScore">0</span></div>
            
            <div class="instruction-grid">
                <div class="instruction-item">
                    <span class="instruction-label">Keyboard</span>
                    <div class="key-visual">
                        <span class="key highlight">→ KEY</span>
                    </div>
                    <span style="font-size: 11px; line-height: 1.4; margin-top: 8px;">HOLD: RIGHT<br>RELEASE: LEFT<br><b>SPACE: START</b></span>
                </div>
                <div class="instruction-item">
                    <span class="instruction-label">Touch / Click</span>
                    <div style="display:flex; gap:10px; align-items:center;">
                         <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 12H5M5 12L12 19M5 12L12 5"/></svg>
                         <div style="width:20px; height:2px; background:rgba(255,255,255,0.3)"></div>
                         <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12H19M19 12L12 5M19 12L12 19"/></svg>
                    </div>
                    <span style="font-size: 11px; line-height: 1.4; margin-top: 8px;">TOUCH: RIGHT<br>RELEASE: LEFT</span>
                </div>
            </div>

            <button class="action-btn" onclick="requestPermissionAndStart()">START GAME (SPACE)</button>
            <p class="footer-note">Right Arrow to move. Space to restart.</p>
        </div>
    </div>

    <div id="gameOverModal" class="modal">
        <div class="modal-content">
            <div class="modal-title">GAME OVER</div>
            <div class="score-row">Score: <span id="finalScore">0</span></div>
            <div class="score-row highscore-row">HIGH SCORE: <span id="highScore">0</span></div>
            <button class="action-btn" onclick="resetGame()">RETRY (SPACE)</button>
            <p class="footer-note">Press Space or Enter to restart</p>
        </div>
    </div>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const startModal = document.getElementById("startModal");
    const gameOverModal = document.getElementById("gameOverModal");
    const finalScoreText = document.getElementById("finalScore");
    const highScoreText = document.getElementById("highScore");
    const startHighScoreText = document.getElementById("startHighScore");
    const controlBar = document.getElementById("controlBar");
    const controlLabel = document.getElementById("controlLabel");
    const arrowLeft = document.getElementById("arrowLeft");
    const arrowRight = document.getElementById("arrowRight");

    const STORAGE_KEY = 'heading_master_highscore_v2';
    let audioCtx;

    function initAudio() {
        if (!audioCtx) {
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        }
    }

    function playSound(type, comboCount = 0) {
        if (!audioCtx) return;
        if (audioCtx.state === 'suspended') audioCtx.resume();
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);

        if (type === 'hit') {
            osc.type = 'sine';
            const freq = 400 + (Math.min(comboCount, 15) * 30);
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(freq * 0.5, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        } 
        else if (type === 'wall') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(220, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.15, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        }
        else if (type === 'ball-collision') {
            osc.type = 'triangle';
            osc.frequency.setValueAtTime(300, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(150, audioCtx.currentTime + 0.08);
            gain.gain.setValueAtTime(0.12, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.08);
        }
        else if (type === 'over') {
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.linearRampToValueAtTime(40, audioCtx.currentTime + 0.5);
            gain.gain.setValueAtTime(0.2, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.5);
        }
    }

    const baseWidth = 400;
    const baseHeight = 500;
    const scale = Math.min(window.innerWidth * 0.95 / baseWidth, window.innerHeight * 0.55 / baseHeight);
    canvas.width = baseWidth;
    canvas.height = baseHeight;
    canvas.style.width = (baseWidth * scale) + "px";
    canvas.style.height = (baseHeight * scale) + "px";

    // Synchronize control bar width with canvas display width
    controlBar.style.width = (baseWidth * scale) + "px";

    let score = 0;
    let combo = 0;
    let gameOver = true; 
    let gameStarted = false;
    let particles = [];
    let balls = [];
    let lastSpawnTime = 0;
    let isMoving = false; // Input is active
    
    const scoreAnim = {
        val: 0, opacity: 0, scale: 1.0, startTime: 0
    };

    const SPAWN_INTERVAL = 2500; 
    const MAX_BALLS = 12;        

    const paddle = {
        w: 60,
        h: 70,
        x: canvas.width / 2,
        y: canvas.height - 10,
        baseSpeed: 5, 
        speed: 5,     
        dx: 0,
        color: "#ffdbac"
    };

    function createBall() {
        return {
            x: Math.random() * (canvas.width - 100) + 50, 
            y: -50,
            radius: 26,
            dx: (Math.random() - 0.5) * 6,
            dy: 2,
            gravity: 0.22,
            friction: 0.995,
            bounce: -13,
            angle: 0,
            rotationSpeed: (Math.random() - 0.5) * 0.2,
            squish: 0,
            squishAngle: 0,
            targetSquish: 0
        };
    }

    let moveRight = false;

    function applySquish(ball, angle, intensity = 0.25) {
        ball.squish = intensity;
        ball.squishAngle = angle;
    }

    function createParticles(x, y, color) {
        for(let i=0; i<8; i++) {
            particles.push({
                x: x, y: y,
                dx: (Math.random() - 0.5) * 8,
                dy: (Math.random() - 0.5) * 8,
                life: 1.0, color: color
            });
        }
    }

    function checkBallCollision(b1, b2) {
        if (b1.y < 0 || b2.y < 0) return;

        const dx = b2.x - b1.x;
        const dy = b2.y - b1.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        if (dist < b1.radius + b2.radius) {
            const angle = Math.atan2(dy, dx);
            const sin = Math.sin(angle);
            const cos = Math.cos(angle);
            const overlap = (b1.radius + b2.radius - dist) / 2;
            b1.x -= overlap * cos;
            b1.y -= overlap * sin;
            b2.x += overlap * cos;
            b2.y += overlap * sin;
            const v1 = b1.dx * cos + b1.dy * sin;
            const v2 = b2.dx * cos + b2.dy * sin;
            b1.dx = b1.dx - (v1 - v2) * cos;
            b1.dy = b1.dy - (v1 - v2) * sin;
            b2.dx = b2.dx + (v1 - v2) * cos;
            b2.dy = b2.dy + (v1 - v2) * sin;
            
            applySquish(b1, angle, 0.2); 
            applySquish(b2, angle + Math.PI, 0.2);
            
            playSound('ball-collision');
        }
    }

    async function requestPermissionAndStart() {
        initAudio();
        startGame();
    }

    function startGame() {
        gameStarted = true;
        startModal.classList.remove("show");
        resetGame();
    }

    function resetGame() {
        initAudio();
        score = 0;
        combo = 0;
        gameOver = false;
        gameOverModal.classList.remove("show");
        scoreAnim.opacity = 0;
        balls = [createBall()];
        lastSpawnTime = Date.now();
        paddle.x = canvas.width / 2;
        particles = [];
        moveRight = false;
        isMoving = false;
        updateVisualFeedback();
        requestAnimationFrame(gameLoop);
    }

    function updateVisualFeedback() {
        if (!gameStarted || gameOver) {
            controlLabel.innerText = "READY";
            controlLabel.classList.remove('hidden');
            arrowRight.classList.remove('active');
            arrowLeft.classList.remove('active');
            return;
        }

        if (isMoving) {
            controlLabel.classList.add('hidden');
            if (moveRight) {
                arrowRight.classList.add('active');
                arrowLeft.classList.remove('active');
            } else {
                arrowRight.classList.remove('active');
                arrowLeft.classList.add('active');
            }
        } else {
            controlLabel.innerText = "HEADING...";
            controlLabel.classList.remove('hidden');
            arrowRight.classList.remove('active');
            arrowLeft.classList.remove('active');
        }
    }

    // Input Handling
    window.addEventListener("keydown", e => {
        if(e.key === "ArrowRight") {
            moveRight = true;
            isMoving = true;
            updateVisualFeedback();
        }
        
        if(e.key === " " || e.key === "Enter") {
            if(!gameStarted) {
                requestPermissionAndStart();
            } else if(gameOver) {
                resetGame();
            }
        }
    });

    window.addEventListener("keyup", e => {
        if(e.key === "ArrowRight") {
            moveRight = false;
            // Always set isMoving to true because release results in "Left" movement
            // But we can reset it when game ends or starts
            updateVisualFeedback();
        }
    });

    function handlePointerStart(e) {
        if (gameOver) return;
        moveRight = true;
        isMoving = true;
        updateVisualFeedback();
    }

    function handlePointerEnd(e) {
        if (gameOver) return;
        moveRight = false;
        // Keep isMoving true because it's still moving left
        updateVisualFeedback();
    }

    [controlBar, canvas].forEach(el => {
        el.addEventListener("touchstart", (e) => { 
            e.preventDefault(); 
            if (!gameOver && gameStarted) {
                handlePointerStart(e); 
            }
        }, {passive: false});
        el.addEventListener("touchend", handlePointerEnd);
        el.addEventListener("touchcancel", handlePointerEnd);
        el.addEventListener("mousedown", (e) => {
            if (!gameOver && gameStarted) {
                handlePointerStart(e);
            }
        });
    });
    window.addEventListener("mouseup", handlePointerEnd);

    function update() {
        if (gameOver) return;

        paddle.speed = paddle.baseSpeed + (balls.length * 1.5);

        if (Date.now() - lastSpawnTime > SPAWN_INTERVAL && balls.length < MAX_BALLS) {
            balls.push(createBall());
            lastSpawnTime = Date.now();
        }

        paddle.dx = moveRight ? paddle.speed : -paddle.speed;
        paddle.x += paddle.dx;
        
        const leftLimit = paddle.w/2;
        const rightLimit = canvas.width - paddle.w/2;

        if (paddle.x < leftLimit) paddle.x = leftLimit;
        if (paddle.x > rightLimit) paddle.x = rightLimit;

        if (scoreAnim.opacity > 0) {
            const elapsed = Date.now() - scoreAnim.startTime;
            if (elapsed > 100) { 
                scoreAnim.opacity -= 0.015; 
                scoreAnim.scale += 0.002;
            }
        }

        for (let i = balls.length - 1; i >= 0; i--) {
            let ball = balls[i];
            ball.dy += ball.gravity;
            ball.x += ball.dx;
            ball.y += ball.dy;
            ball.angle += ball.rotationSpeed;
            ball.dx *= ball.friction;

            ball.squish += (ball.targetSquish - ball.squish) * 0.25;

            if (ball.x < ball.radius) {
                ball.dx *= -0.8;
                ball.x = ball.radius;
                if (ball.y > 0) {
                    playSound('wall');
                    applySquish(ball, Math.PI, 0.2);
                }
            } else if (ball.x > canvas.width - ball.radius) {
                ball.dx *= -0.8;
                ball.x = canvas.width - ball.radius;
                if (ball.y > 0) {
                    playSound('wall');
                    applySquish(ball, 0, 0.2);
                }
            }
            if (ball.y < ball.radius) {
                ball.dy *= -0.8;
                ball.y = ball.radius;
                if (ball.y > 0) {
                    playSound('wall');
                    applySquish(ball, -Math.PI/2, 0.2);
                }
            }

            const headCenterX = paddle.x;
            const headCenterY = paddle.y - paddle.h / 1.5;
            const headRadius = paddle.w / 2.2;

            const distDx = ball.x - headCenterX;
            const distDy = ball.y - headCenterY;
            const distance = Math.sqrt(distDx * distDx + distDy * distDy);

            if (ball.dy > -1 && distance < ball.radius + headRadius) {
                const collisionAngle = Math.atan2(distDy, distDx);
                
                const pushDist = (ball.radius + headRadius) - distance;
                ball.x += Math.cos(collisionAngle) * pushDist;
                ball.y += Math.sin(collisionAngle) * pushDist;

                const bounceStrength = Math.abs(ball.bounce);
                
                ball.dx = Math.cos(collisionAngle) * bounceStrength * 0.8 + paddle.dx * 0.5;
                ball.dy = -Math.abs(Math.sin(collisionAngle)) * bounceStrength;

                ball.rotationSpeed = ball.dx * 0.05;

                applySquish(ball, collisionAngle, 0.25);

                score++;
                combo++;
                scoreAnim.val = score;
                scoreAnim.opacity = 1.0;
                scoreAnim.scale = 1.0;
                scoreAnim.startTime = Date.now();
                createParticles(ball.x, ball.y + ball.radius, "#f1c40f");
                playSound('hit', combo);
            }

            for (let j = i - 1; j >= 0; j--) {
                checkBallCollision(ball, balls[j]);
            }

            if (ball.y > canvas.height + 50) {
                balls.splice(i, 1);
                combo = 0; 
                if (balls.length === 0) endGame();
            }
        }

        particles.forEach((p, i) => {
            p.x += p.dx; p.y += p.dy; p.life -= 0.02;
            if(p.life <= 0) particles.splice(i, 1);
        });
    }

    function endGame() {
        gameOver = true;
        isMoving = false;
        updateVisualFeedback();
        playSound('over');
        scoreAnim.opacity = 0;
        let savedHighScore = parseInt(localStorage.getItem(STORAGE_KEY)) || 0;
        if (score > savedHighScore) {
            savedHighScore = score;
            localStorage.setItem(STORAGE_KEY, savedHighScore.toString());
            highScoreText.innerHTML = `${savedHighScore} <span style="color:#2ecc71;font-size:16px">NEW!</span>`;
        } else {
            highScoreText.innerText = savedHighScore;
        }
        startHighScoreText.innerText = savedHighScore;
        finalScoreText.innerText = score;
        gameOverModal.classList.add("show");
    }

    function drawScoreText() {
        if (scoreAnim.opacity <= 0) return;
        ctx.save();
        ctx.globalAlpha = scoreAnim.opacity;
        ctx.fillStyle = "#f1c40f";
        ctx.textAlign = "center";
        ctx.textBaseline = "top"; 
        ctx.font = `900 ${100 * scoreAnim.scale}px 'Segoe UI', sans-serif`;
        ctx.shadowColor = "rgba(0, 0, 0, 0.9)";
        ctx.shadowBlur = 20;
        ctx.fillText(scoreAnim.val, canvas.width / 2, 30);
        ctx.restore();
    }

    function drawSoccerBall(ball) {
        const { x, y, radius, angle, squish, squishAngle } = ball;
        
        ctx.save();
        ctx.translate(x, y);
        
        ctx.rotate(squishAngle);
        ctx.scale(1 - squish, 1 + squish);
        ctx.rotate(-squishAngle);
        
        ctx.rotate(angle);

        ctx.beginPath();
        ctx.arc(0, 0, radius, 0, Math.PI * 2);
        const grad = ctx.createRadialGradient(-radius * 0.3, -radius * 0.3, radius * 0.1, 0, 0, radius);
        grad.addColorStop(0, "#fff"); 
        grad.addColorStop(1, "#888");
        ctx.fillStyle = grad;
        ctx.fill();
        ctx.strokeStyle = "#000";
        ctx.lineWidth = 2;
        ctx.stroke();

        ctx.fillStyle = "#222";
        for (let i = 0; i < 5; i++) {
            ctx.beginPath();
            const a = (Math.PI * 2 / 5) * i;
            ctx.arc(Math.cos(a) * radius * 0.6, Math.sin(a) * radius * 0.6, radius * 0.28, 0, Math.PI * 2);
            ctx.fill();
        }
        
        ctx.restore();
    }

    function drawCharacter(x, y, w, h) {
        ctx.save();
        ctx.fillStyle = "#3498db";
        ctx.beginPath(); ctx.roundRect(x - w/2.5, y - h/2.5, w/1.25, h/2, 5); ctx.fill();
        ctx.fillStyle = paddle.color;
        ctx.beginPath(); ctx.ellipse(x, y - h/1.5, w/2.2, h/2.5, 0, 0, Math.PI * 2); ctx.fill();
        ctx.fillStyle = "#000";
        ctx.beginPath(); ctx.arc(x - 8, y - h/1.5 - 5, 3, 0, Math.PI * 2); ctx.fill();
        ctx.beginPath(); ctx.arc(x + 8, y - h/1.5 - 5, 3, 0, Math.PI * 2); ctx.fill();
        ctx.strokeStyle = "#000"; ctx.lineWidth = 2;
        ctx.beginPath(); ctx.arc(x, y - h/1.5 + 5, 7, 0.2, Math.PI - 0.2); ctx.stroke();
        ctx.restore();
    }

    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.strokeStyle = "rgba(255,255,255,0.08)";
        ctx.lineWidth = 1.5;
        for(let i=0; i<canvas.width; i+=40) {
            ctx.beginPath(); ctx.moveTo(i, 0); ctx.lineTo(i, canvas.height); ctx.stroke();
        }
        for(let i=0; i<canvas.height; i+=40) {
            ctx.beginPath(); ctx.moveTo(0, i); ctx.lineTo(canvas.width, i); ctx.stroke();
        }
        drawScoreText();
        particles.forEach(p => {
            ctx.save(); ctx.globalAlpha = p.life; ctx.fillStyle = p.color;
            ctx.beginPath(); ctx.arc(p.x, p.y, 3, 0, Math.PI*2); ctx.fill(); ctx.restore();
        });
        drawCharacter(paddle.x, paddle.y, paddle.w, paddle.h);
        balls.forEach(ball => drawSoccerBall(ball));
    }

    function gameLoop() {
        if (!gameOver) {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }
    }

    window.onload = function() {
        const savedHighScore = localStorage.getItem(STORAGE_KEY) || "0";
        startHighScoreText.innerText = savedHighScore;
        updateVisualFeedback(); 
        draw();
    };
</script>
</body>
</html>
